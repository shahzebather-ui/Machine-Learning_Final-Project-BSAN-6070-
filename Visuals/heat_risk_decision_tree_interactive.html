<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat Risk Decision Tree — Interactive</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
  h1 { font-size: 18px; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; letter-spacing: 0.02em; }
  .subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }

  .q-panel { background: #1a1a1a; border: 0.5px solid #333; border-radius: 12px; padding: 16px 20px; margin-bottom: 14px; width: 100%; max-width: 860px; }
  .q-text { font-size: 15px; font-weight: 500; color: #f0f0f0; margin-bottom: 4px; }
  .q-feat { font-size: 11px; color: #666; margin-bottom: 14px; }
  .btns { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 10px; border-radius: 8px; border: 0.5px solid #444; background: #222; color: #e0e0e0; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .btn.yes:hover { background: #1a2e1a; border-color: #3B6D11; color: #7fc741; }
  .btn.no:hover  { background: #2e1a1a; border-color: #993C1D; color: #f0997b; }

  .result-panel { border-radius: 12px; padding: 18px 22px; border: 0.5px solid; margin-bottom: 14px; width: 100%; max-width: 860px; }
  .result-val { font-size: 32px; font-weight: 500; }
  .result-meta { font-size: 13px; margin-top: 6px; opacity: .8; }
  .r-low  { background: #0d1f0d; border-color: #3B6D11; color: #7fc741; }
  .r-mod  { background: #1f1800; border-color: #BA7517; color: #FAC775; }
  .r-high { background: #1f0d00; border-color: #993C1D; color: #F0997B; }
  .r-sev  { background: #1f0000; border-color: #A32D2D; color: #F09595; }

  .reset-btn { font-size: 12px; color: #666; cursor: pointer; text-decoration: underline; margin-bottom: 16px; display: inline-block; }
  .reset-btn:hover { color: #aaa; }

  svg { width: 100%; max-width: 860px; display: block; }
  .edge { stroke: #333; stroke-width: 1; fill: none; transition: stroke .4s, stroke-width .4s; }
  .edge.active { stroke: #555; stroke-width: 1.2; }
  .edge.chosen { stroke: #1D9E75; stroke-width: 2.5; }
  .lbl { font-size: 10px; fill: #444; transition: fill .3s; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .lbl.chosen { fill: #1D9E75; font-weight: 600; }
  .lbl.active { fill: #555; }

  .path-trail { font-size: 11px; color: #555; margin-bottom: 10px; max-width: 860px; width: 100%; line-height: 1.7; }
  .path-trail span { color: #1D9E75; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; color: #666; margin-bottom: 16px; max-width: 860px; width: 100%; }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<script>
const steps = [
  {id:'root',q:'Is average weekly max temperature ≤ 33.89°C?',feat:'feat_mean_tmax_c_week · threshold: 33.891°C',yes:'L',no:'R'},
  {id:'L',   q:'Is average weekly max temperature ≤ 31.55°C?',feat:'feat_mean_tmax_c_week · threshold: 31.554°C',yes:'LL',no:'LR'},
  {id:'R',   q:'Is average weekly max temperature ≤ 35.76°C?',feat:'feat_mean_tmax_c_week · threshold: 35.757°C',yes:'RL',no:'RR'},
  {id:'LL',  q:'Is average weekly max temperature ≤ 29.39°C?',feat:'feat_mean_tmax_c_week · threshold: 29.391°C',yes:'LLL',no:'LLR'},
  {id:'LR',  q:'Is average weekly max temperature ≤ 33.33°C?',feat:'feat_mean_tmax_c_week · threshold: 33.334°C',yes:'LRL',no:'LRR'},
  {id:'RL',  q:'Is poverty rate ≤ 12.5%?',feat:'feat_poverty_rate · threshold: 0.125',yes:'RLL',no:'RLR'},
  {id:'RR',  q:'Is total population ≤ 51 million?',feat:'feat_total_population · threshold: 51,090,694',yes:'RRL',no:'RRR'},
];
const leaves = {
  LLL:{val:55, n:19, risk:'r-low', label:'Low risk'},
  LLR:{val:111,n:17, risk:'r-low', label:'Low risk'},
  LRL:{val:171,n:20, risk:'r-mod', label:'Moderate'},
  LRR:{val:237,n:12, risk:'r-mod', label:'Moderate'},
  RLL:{val:404,n:18, risk:'r-high',label:'High risk'},
  RLR:{val:283,n:15, risk:'r-mod', label:'Moderate'},
  RRL:{val:509,n:18, risk:'r-high',label:'High risk'},
  RRR:{val:779,n:8,  risk:'r-sev', label:'Severe risk'},
};

let cur = 'root', pathSteps = [];

function setOpacity(id, v) { const el = document.getElementById('n-'+id); if(el) el.setAttribute('opacity', v); }
function activateEdge(from, to, chosen) {
  const e = document.getElementById('e-'+from+'-'+to);
  const l = document.getElementById('lbl-'+from+'-'+to);
  if(e) e.classList.add(chosen ? 'chosen' : 'active');
  if(l) l.classList.add(chosen ? 'chosen' : 'active');
}

function updateTrail() {
  const t = document.getElementById('trail');
  if(!pathSteps.length){ t.innerHTML = 'Path: <span>root</span>'; return; }
  t.innerHTML = 'Path: <span>root</span> → ' + pathSteps.map(s=>`<span>${s.label}</span>`).join(' → ');
}

function renderQ() {
  const step = steps.find(s=>s.id===cur);
  document.getElementById('q-area').innerHTML = `
    <div class="q-panel">
      <div class="q-text">${step.q}</div>
      <div class="q-feat">${step.feat}</div>
      <div class="btns">
        <button class="btn yes" onclick="choose(true)">Yes — True</button>
        <button class="btn no" onclick="choose(false)">No — False</button>
      </div>
    </div>`;
  setOpacity(cur, 1);
}

function choose(yes) {
  const step = steps.find(s=>s.id===cur);
  const next = yes ? step.yes : step.no;
  pathSteps.push({label: yes ? 'True' : 'False'});
  activateEdge(cur, next, true);
  cur = next;
  updateTrail();
  if(leaves[cur]) {
    setOpacity(cur, 1);
    showLeaf(cur);
  } else {
    setOpacity(cur, 1);
    const ns = steps.find(s=>s.id===cur);
    [ns.yes, ns.no].forEach(c=>{ setOpacity(c, 0.4); activateEdge(cur, c, false); });
    renderQ();
  }
}

function showLeaf(id) {
  const leaf = leaves[id];
  document.getElementById('q-area').innerHTML = `
    <div class="result-panel ${leaf.risk}">
      <div class="result-val">ŷ = ${leaf.val}</div>
      <div class="result-meta">${leaf.label} · ${leaf.n} training samples reached this leaf</div>
    </div>
    <span class="reset-btn" onclick="reset()">↺ Start over</span>`;
}

function reset() {
  cur='root'; pathSteps=[];
  document.querySelectorAll('.edge').forEach(e=>e.classList.remove('chosen','active'));
  document.querySelectorAll('.lbl').forEach(l=>l.classList.remove('chosen','active'));
  ['root','L','R','LL','LR','RL','RR'].forEach(id=>setOpacity(id, id==='root'?1:0.3));
  ['LLL','LLR','LRL','LRR','RLL','RLR','RRL','RRR'].forEach(id=>setOpacity(id,0.1));
  ['L','R'].forEach(id=>activateEdge('root',id,false));
  updateTrail();
  renderQ();
}

reset();
</script>
</body>
</html>
